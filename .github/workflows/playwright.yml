name: Playwright Tests

on:
  pull_request:
    branches: [ main, master ]

jobs:
  test-with-docker:
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t playwright-tests .

      - name: Run one Playwright test inside Docker
        run: docker run --rm -v ${{ github.workspace }}/playwright-report:/app/playwright-report playwright-tests npx playwright test tests/authenticateViaApi.spec.ts --workers=1

      - name: Upload Docker Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report-docker
          path: playwright-report/
          retention-days: 30